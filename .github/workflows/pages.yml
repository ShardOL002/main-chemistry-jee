name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git commit or tag to deploy (use a previous green SHA to roll back)
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected release
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref || github.sha }}
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Test learning path, accessibility, performance, and privacy controls
        run: node --test *.test.js
      - name: Check JavaScript syntax
        run: node --check app-core.js && node --check app.js && node --check observability-core.js && node --check observability.js

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected release
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref || github.sha }}
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
